<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inicio de Turno | ATC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-800 to-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white/95 backdrop-blur-md w-full max-w-sm p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-6">
            <div class="bg-blue-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-user-shield text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Acceso a Bodega</h2>
            <p class="text-gray-500 text-sm mt-1">Selecciona tu usuario e ingresa el PIN</p>
        </div>

        <!-- MUESTRA MENSAJES DE ERROR SI EL PIN ESTÁ MAL -->
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6 text-center text-sm font-semibold animate-pulse">
                <i class="fas fa-exclamation-circle mr-1"></i> {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/" method="POST" class="space-y-6">
            
            <!-- SELECTOR DE USUARIO -->
            <div class="relative">
                <label class="text-xs font-bold text-gray-600 uppercase tracking-wider ml-1">1. Operario</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user text-gray-400"></i>
                    </div>
                    <select name="operario" required class="block w-full pl-10 pr-4 py-3 border-gray-200 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold text-gray-700 appearance-none bg-white">
                        <option value="" disabled selected>Elige tu nombre...</option>
                        <option value="Jose">Jose</option>
                        <option value="Francisca">Francisca</option>
                        <option value="Alejandro">Alejandro</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <i class="fas fa-chevron-down text-gray-400 text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- CAMPO DE PIN (SOLO NÚMEROS Y OCULTO) -->
            <div class="relative">
                <label class="text-xs font-bold text-gray-600 uppercase tracking-wider ml-1">2. PIN de Seguridad (4 dígitos)</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-key text-gray-400"></i>
                    </div>
                    <!-- pattern="[0-9]*" y inputmode="numeric" obliga a los celulares a abrir solo el teclado numérico -->
                    <input type="password" name="pin" required maxlength="4" pattern="[0-9]*" inputmode="numeric"
                        class="block w-full pl-10 pr-4 py-3 border-gray-200 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-semibold text-gray-700 tracking-[0.5em] text-center text-xl" 
                        placeholder="••••">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2">
                    <span>Ingresar</span>
                    <i class="fas fa-sign-in-alt"></i>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
